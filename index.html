<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col p-4">
    <div class="max-w-xl mx-auto w-full bg-white rounded-lg shadow p-4 flex flex-col h-full">
        <div id="chat-box" class="flex-1 overflow-y-auto mb-4 border-b pb-4">
            <p class="text-gray-500">System: Click "Send" to initialize AI...</p>
        </div>
        <div class="flex gap-2">
            <input type="text" id="userInput" class="border p-2 flex-1 rounded" placeholder="Type here...">
            <button id="sendBtn" class="bg-blue-500 text-white px-4 py-2 rounded">Send</button>
        </div>
    </div>

    <script type="module">
        import { CreateMLCEngine } from "https://esm.run/@mlc.ai/web-llm";

        let engine;
        const chatBox = document.getElementById("chat-box");
        const sendBtn = document.getElementById("sendBtn");
        const userInput = document.getElementById("userInput");

        sendBtn.addEventListener("click", async () => {
            const text = userInput.value;
            if(!text) return;
            
            chatBox.innerHTML += `<p class="text-right text-blue-600"><b>You:</b> ${text}</p>`;
            userInput.value = "";

            try {
                if(!engine) {
                    chatBox.innerHTML += `<p class="text-xs text-gray-400">Loading AI... (Wait 1 minute)</p>`;
                    engine = await CreateMLCEngine("Phi-3-mini-4k-instruct-q4f16_1-MLC");
                }
                
                const reply = await engine.chat.completions.create({
                    messages: [{role: "user", content: text}]
                });
                
                chatBox.innerHTML += `<p class="text-left text-gray-800"><b>AI:</b> ${reply.choices[0].message.content}</p>`;
            } catch (err) {
                chatBox.innerHTML += `<p class="text-red-500">Error: ${err.message}</p>`;
            }
        });
    </script>
</body>
</html>
